# Ruff config for the leetcode_practice repo.
# This scopes ruff to the leetcode/ workdir and its generated LeetCode
# templates. It silences E501 (line length)
# because templates can be long, and E402 (module-level imports not
# at top) because the template inserts a docstring before the import
# block. LeetCode templates also rely on platform-provided names like
# List and ListNode, and problem statements can contain whitespace-only
# blank lines.
target-version = "py312"
line-length = 100
extend-exclude = [
  ".venv",
  "__pycache__",
  "leetcode/**/.notes",
  "leetcode/.current",
]

[lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
  "E501",  # line length
  "E402",  # module-level imports
]

[lint.per-file-ignores]
"leetcode/**/*.py" = ["F821", "F841", "W293"]
